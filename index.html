<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Physics Chalkboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root { --chalk: #f5f5f5; --board-bg: #1e3d32; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #222; color: white; }

        /* מסך בחירה ראשוני */
        #setup-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; gap: 20px; background: #333; 
        }
        .setup-btn { 
            padding: 20px 40px; font-size: 1.5rem; cursor: pointer; border-radius: 15px; 
            border: none; background: #2563eb; color: white; transition: 0.2s;
        }
        .setup-btn:hover { background: #1d4ed8; }

        /* מצב לוח (למחשב) */
        #board { 
            display: none; height: 100vh; background: var(--board-bg);
            color: var(--chalk); padding: 50px; box-sizing: border-box;
            border: 15px solid #5d4037; box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            font-family: 'Caveat', cursive;
        }
        #math-output { font-size: 4rem; text-shadow: 2px 2px 5px rgba(255,255,255,0.2); text-align: left; }

        /* מצב שלט (לטאבלט) */
        #remote { display: none; height: 100vh; background: #f0f0f0; padding: 20px; box-sizing: border-box; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .btn { 
            background: white; border: 2px solid #ccc; padding: 15px; 
            font-size: 1.8rem; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:active { background: #e0e0e0; transform: scale(0.95); }
        .status { font-size: 0.9rem; margin-bottom: 10px; color: #666; font-family: sans-serif; }
        #input-preview { 
            width: 100%; height: 60px; font-size: 1.4rem; margin-bottom: 20px;
            padding: 10px; border-radius: 8px; border: 2px solid #2563eb; box-sizing: border-box;
        }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 150px; margin: 10px auto; }
        .nav-btn { background: #ddd; border: 1px solid #bbb; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>בחר מצב עבודה:</h1>
    <button class="setup-btn" onclick="startMode('board')">אני המחשב (הלוח)</button>
    <button class="setup-btn" onclick="startMode('remote')" style="background: #10b981;">אני הטאבלט (השלט)</button>
</div>

<div id="board">
    <div class="status" id="board-id-display">מייצר קוד לחיבור...</div>
    <div id="math-output"></div>
</div>

<div id="remote">
    <div id="connection-controls">
        <div class="status" id="conn-status">הכנס את הקוד שמופיע על הלוח במחשב:</div>
        <input type="text" id="target-id" placeholder="למשל: abc-123" style="padding:10px; font-size:1.2rem; border-radius:8px; border:1px solid #ccc; width:70%;">
        <button onclick="connectToBoard()" style="padding:10px 20px; font-size:1.2rem; border-radius:8px; background:#10b981; color:white; border:none;">חבר</button>
    </div>
    <hr>
    <input type="text" id="input-preview" placeholder="כאן יופיע הקוד...">
    
    <div class="grid">
        <button class="btn" onclick="send('\\frac{}{}')">$$\frac{\Box}{\Box}$$</button>
        <button class="btn" onclick="send('^{}')">$$x^\Box$$</button>
        <button class="btn" onclick="send('\\sqrt{}')">$$\sqrt{\Box}$$</button>
        <button class="btn" onclick="send('\\Delta')">Δ</button>
        <button class="btn" onclick="send('\\lambda')">λ</button>
        <button class="btn" onclick="send('\\cdot')">$$\cdot$$</button>
        <button class="btn" onclick="send('\\pi')">π</button>
        <button class="btn" onclick="send('\\rightarrow')">$$\rightarrow$$</button>
        <button class="btn" onclick="clearText()" style="background:#ffcccc; font-size: 1rem;">AC (נקה)</button>
    </div>

    <div class="nav-grid">
        <div></div><button class="nav-btn" onclick="move(1)">▶</button><div></div>
        <button class="nav-btn" onclick="move(-1)">◀</button><div></div><div></div>
    </div>
</div>

<script>
    let peer = new Peer();
    let conn;
    const inputPreview = document.getElementById('input-preview');

    function startMode(mode) {
        document.getElementById('setup-screen').style.display = 'none';
        if (mode === 'board') {
            document.getElementById('board').style.display = 'block';
            setupBoard();
        } else {
            document.getElementById('remote').style.display = 'block';
        }
    }

    function setupBoard() {
        peer.on('open', id => {
            document.getElementById('board-id-display').innerText = "קוד לחיבור בטאבלט: " + id;
        });
        peer.on('connection', c => {
            conn = c;
            conn.on('data', data => renderMath(data));
            document.getElementById('board-id-display').innerText = "סטטוס: מחובר!";
        });
    }

    function connectToBoard() {
        const id = document.getElementById('target-id').value;
        conn = peer.connect(id);
        conn.on('open', () => {
            document.getElementById('conn-status').innerText = "מחובר ללוח בהצלחה!";
            document.getElementById('connection-controls').style.opacity = "0.5";
        });
    }

    function send(val) {
        const start = inputPreview.selectionStart;
        const end = inputPreview.selectionEnd;
        inputPreview.value = inputPreview.value.substring(0, start) + val + inputPreview.value.substring(end);
        
        // הצבת הסמן בתוך הסוגריים בשבר/חזקה
        if(val.includes('{}')) {
            inputPreview.selectionStart = start + val.indexOf('{') + 1;
            inputPreview.selectionEnd = inputPreview.selectionStart;
        }
        
        if (conn) conn.send(inputPreview.value);
        inputPreview.focus();
    }

    function clearText() {
        inputPreview.value = '';
        if (conn) conn.send('');
    }

    function move(dir) {
        inputPreview.selectionStart += dir;
        inputPreview.selectionEnd = inputPreview.selectionStart;
        inputPreview.focus();
    }

    function renderMath(latex) {
        const output = document.getElementById('math-output');
        try {
            katex.render(latex, output, { throwOnError: false, displayMode: true });
        } catch (e) {}
    }
</script>
</body>
</html>
